name: onemcp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onemcp}
      POSTGRES_USER: ${POSTGRES_USER:-onemcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onemcp} -d ${POSTGRES_DB:-onemcp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "effective_cache_size=12GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "max_connections=200"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "1gb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-onemcp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-min-8-chars}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_URL: postgres://${POSTGRES_USER:-onemcp}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-onemcp}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-onemcp}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me-min-8-chars}
      USER_ALLOW_CIDR: ${USER_ALLOW_CIDR:-10.0.14.0/24}
      ADMIN_ALLOW_CIDR: ${ADMIN_ALLOW_CIDR:-192.168.122.0/24}
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-127.0.0.1/32}
      TRUST_USER_HEADER: ${TRUST_USER_HEADER:-X-Onemcp-User}
      DEFAULT_ROLE: ${DEFAULT_ROLE:-contributor}
      MAINTAINER_USERNAMES: ${MAINTAINER_USERNAMES:-}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      EMERGENCY_LOCKDOWN: ${EMERGENCY_LOCKDOWN:-false}
      GIT_MIRROR_ROOT: /var/lib/onemcp/mirrors
    volumes:
      - git-mirrors:/var/lib/onemcp/mirrors
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost/api}
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - portal
    volumes:
      - ./ops/nginx/onemcp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/nginx/tls:/etc/nginx/tls:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  pg-data:
  redis-data:
  minio-data:
  git-mirrors:
