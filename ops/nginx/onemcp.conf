# OneMCP nginx reverse proxy
# HTTPS termination + real IP forwarding for backend IP CIDR guard

# Docker embedded DNS — defer upstream resolution to request time so nginx
# doesn't crash if backend/portal container not yet up at nginx boot.
resolver 127.0.0.11 valid=10s ipv6=off;

# Trust Docker network for X-Forwarded-For rewriting
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 10.0.0.0/8;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Rate limit zones (per IP + username claim)
limit_req_zone $binary_remote_addr zone=user_ip:10m rate=100r/s;
limit_req_zone "$binary_remote_addr$http_x_onemcp_user" zone=user_id:10m rate=200r/s;

# --- HTTP → HTTPS redirect ---
server {
  listen 80 default_server;
  server_name _;
  return 301 https://$host$request_uri;
}

# --- HTTPS main ---
server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/tls/onemcp.crt;
  ssl_certificate_key /etc/nginx/tls/onemcp.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Body size (attachments up to 100MB — enforced further at MinIO presign)
  client_max_body_size 100M;

  # Rate limits
  limit_req zone=user_ip burst=200 nodelay;
  limit_req zone=user_id burst=400 nodelay;

  # --- Backend API + MCP ---
  # Không dùng trailing slash trên proxy_pass URL khi có variable — nginx sẽ
  # forward full path (/api/me) tới backend. Backend có global prefix 'api'.
  location /api/ {
    set $backend_upstream backend;
    proxy_pass         http://$backend_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Onemcp-User     $http_x_onemcp_user;
    proxy_read_timeout 300s;
  }

  # --- MCP SSE endpoint (long-lived) ---
  location /mcp/ {
    set $backend_upstream backend;
    proxy_pass         http://$backend_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Onemcp-User     $http_x_onemcp_user;
    proxy_set_header   Connection        "";
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
  }

  # --- Portal (Next.js) ---
  location / {
    set $portal_upstream portal;
    proxy_pass         http://$portal_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
  }
}
